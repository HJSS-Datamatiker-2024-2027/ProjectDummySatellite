name: Build & Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build and push ProjectDummySatellite image
      run: |
        IMAGE=ghcr.io/hjss-datamatiker-2024-2027/projectdummysatellite:latest
        docker build -t $IMAGE -f ProjectDummySatellite/ProjectDummySatellite.API/Dockerfile ProjectDummySatellite
        docker push $IMAGE
